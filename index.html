<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STATS MB - Ultimate Admin</title>
    <style>
        :root {
            --bg: #050510; --card: #12122b; --blue: #0080ff;
            --green: #00e676; --red: #ff3d00; --orange: #ff9100;
            --glass: rgba(255, 255, 255, 0.08);
            --neon-blue: 0 0 15px rgba(0, 128, 255, 0.4);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-weight: 700 !important; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
            background-size: cover; background-position: center;
            transition: background 0.5s ease;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050510; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo {
            font-size: 50px; color: var(--blue);
            text-shadow: 0 0 20px rgba(0, 128, 255, 0.6);
            animation: pulse 1.5s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .clock-loader {
            width: 80px; height: 80px;
            border: 4px solid var(--blue);
            border-radius: 50%;
            position: relative;
            box-shadow: var(--neon-blue);
        }
        .clock-loader::after, .clock-loader::before {
            content: ""; position: absolute;
            background-color: var(--blue);
            top: 50%; left: 50%;
            transform-origin: bottom center;
            border-radius: 2px;
        }
        .clock-loader::after { width: 4px; height: 20px; margin-left: -2px; margin-top: -20px; animation: clock-spin 6s linear infinite; }
        .clock-loader::before { width: 2px; height: 30px; margin-left: -1px; margin-top: -30px; animation: clock-spin 1s linear infinite; }

        @keyframes clock-spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }

        .app-wrapper { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .screen { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        .screen::-webkit-scrollbar { display: none; }
        
        .card { 
            background: var(--card); padding: 15px; border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid var(--glass); 
            text-align: center; margin-bottom: 10px; backdrop-filter: blur(15px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 15px; border: 1px solid #2a2a45; background: #000; color: white; font-size: 15px; }
        button { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 18px; border: none; 
            font-size: 14px; cursor: pointer; transition: 0.3s; color: white; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:active { transform: scale(0.96); }
        
        #check-in-btn {
            width: 150px !important; height: 150px !important; border-radius: 50% !important;
            margin: 15px auto !important; display: flex; align-items: center; justify-content: center;
            font-size: 16px !important; border: 5px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.4);
        }

        .btn-blue { background: linear-gradient(135deg, #0080ff, #0055ff); }
        .btn-green { background: linear-gradient(135deg, #00e676, #00c853); color: #003300; }
        .btn-red { background: linear-gradient(135deg, #ff3d00, #d50000); }
        .btn-orange { background: linear-gradient(135deg, #ff9100, #ff6d00); }
        .btn-outline { background: transparent; border: 2px solid var(--glass); color: #fff; }

        #clock { font-size: 45px; color: #00ffb3; margin: 5px 0; text-shadow: 0 0 20px rgba(0,255,179,0.5); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; border: 1px solid var(--glass); }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #1a1a35; border-radius: 8px; font-size: 11px; transition: 0.3s; }
        .day.today { border: 1px solid var(--blue); color: var(--blue); }
        .day.present { background: var(--green); color: #000; }
        .day-name { font-size: 9px; color: #666; text-transform: uppercase; padding-bottom: 3px; }

        .announcement-box { 
            background: linear-gradient(45deg, rgba(255, 145, 0, 0.1), rgba(0, 128, 255, 0.1));
            border-left: 4px solid var(--orange); padding: 10px; border-radius: 12px;
            margin: 10px 0; text-align: left; font-size: 12px;
        }

        .stats-table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        .stats-table td { padding: 8px; background: rgba(255,255,255,0.03); font-size: 12px; border-radius: 10px; }

        .profile-header { display: flex; align-items: center; gap: 15px; text-align: left; margin-bottom: 15px; }
        .profile-avatar { width: 60px; height: 60px; background: #1a1a35; border-radius: 50%; border: 2px solid var(--blue); display: flex; align-items: center; justify-content: center; }

        .lang-switch { display: flex; gap: 5px; justify-content: center; margin-bottom: 10px; }
        .lang-btn { padding: 6px 12px; font-size: 10px; width: auto; border: 1px solid var(--glass); }
        .lang-btn.active { background: var(--blue) !important; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">STATS MB</div>
    <div class="clock-loader"></div>
    <p style="margin-top: 30px; color: #444; font-size: 12px; letter-spacing: 2px;">POWERED BY ASADBEK</p>
</div>

<div class="app-wrapper">
    <div id="view-auth" class="screen">
        <div class="card" style="margin-top: 20px;">
            <div class="lang-switch">
                <button id="btn-lat" class="lang-btn active" onclick="setLang('lat')">LOTIN</button>
                <button id="btn-cyr" class="lang-btn" onclick="setLang('cyr')">КРИЛЛ</button>
            </div>
            <h1 style="color: var(--blue); font-size: 30px; margin: 0;">STATS MB</h1>
            <p id="t-auth-p" style="color: #666; margin-bottom: 10px;">Tizimga kiring</p>
            <input type="text" id="user" placeholder="Login">
            <input type="password" id="pass" placeholder="Parol">
            <button id="t-auth-btn" class="btn-blue" onclick="login()">KIRISH</button>
            <button id="t-reg-go" class="btn-outline" onclick="showView('view-reg')">RO'YXATDAN O'TISH</button>
        </div>
    </div>

    <div id="view-reg" class="screen hidden">
        <div class="card">
            <h2 id="t-reg-h2" style="color: var(--orange); margin: 0 0 10px 0;">YANGI HISOB</h2>
            <input type="text" id="reg-user" placeholder="Ism sharif">
            <input type="tel" id="reg-phone" placeholder="Telefon raqam">
            <input type="password" id="reg-pass" placeholder="Parol">
            <button id="t-reg-btn" class="btn-orange" onclick="doRegister()">YARATISH</button>
            <button id="t-back1" class="btn-outline" onclick="showView('view-auth')">ORQAGA</button>
        </div>
    </div>

    <div id="view-main" class="screen hidden">
        <div class="card">
            <div id="clock">00:00:00</div>
            <p style="color: #444; font-size: 10px; margin: -5px 0 10px 0; letter-spacing: 1px;">POWERED BY ASADBEK</p>
            <div id="news-container" class="announcement-box hidden">
                <strong id="t-news-label" style="color:var(--orange)">📢 E'LON:</strong>
                <div id="news-text">...</div>
            </div>
            <button class="btn-green" id="check-in-btn" onclick="doCheckIn()">ISHGA KELDIM</button>
            
            <button id="t-my-attn" class="btn-outline" style="border-color: var(--green); color: var(--green);" onclick="showMyAttendance()">DAVOMAT BO'LIMI</button>
            
            <button id="t-profile-go" class="btn-blue" onclick="showView('view-profile')">MENING PROFILIM</button>
            
            <div id="admin-tools" class="hidden" style="margin-top: 15px; border-top: 1px solid #2a2a45; padding-top: 10px;">
                <button id="t-admin-news" class="btn-green" onclick="showView('view-news-edit')">E'LON QOLDIRISH</button>
                <button id="t-admin-users" class="btn-orange" onclick="showUsersList()">ISHCHILAR (DAVOMAT)</button>
            </div>
            <button id="t-logout" class="btn-red" onclick="location.reload()">CHIQISH</button>
        </div>
    </div>

    <div id="view-my-attn" class="screen hidden">
        <div class="card">
            <h3 style="margin: 0; color: var(--green);">MENING DAVOMATIM</h3>
            <div class="calendar-grid" id="my-calendar"></div>
            <div id="my-history-list" style="margin-top: 15px; max-height: 200px; overflow-y: auto;"></div>
            <button class="btn-blue" onclick="showView('view-main')" style="margin-top: 10px;">ORQAGA</button>
        </div>
    </div>

    <div id="view-profile" class="screen hidden">
        <div class="card">
            <div class="profile-header">
                <div class="profile-avatar"><img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width: 70%;"></div>
                <div>
                    <h2 id="prof-name" style="margin: 0; color: var(--blue); font-size: 18px;">...</h2>
                    <p id="prof-id" style="margin: 0; color: #888; font-size: 11px;">ID: 0</p>
                </div>
            </div>
            <div style="text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid var(--glass); font-size: 13px;">
                <p id="t-p-tel">📞 Tel: <span id="prof-tel-box"></span></p>
                <p id="t-p-pass">🔑 Parol: <span id="prof-pass" style="color: var(--orange);"></span></p>
            </div>
            <button id="t-back2" class="btn-blue" onclick="showView('view-main')" style="margin-top: 15px;">ORQAGA</button>
        </div>
    </div>

    <div id="view-news-edit" class="screen hidden"><div class="card"><h3>E'LON</h3><textarea id="news-input" style="width:100%; height:80px; background:#000; color:#fff; border-radius:10px;"></textarea><button class="btn-green" onclick="saveNews()">SAQLASH</button><button class="btn-blue" onclick="showView('view-main')">ORQAGA</button></div></div>
    <div id="view-users" class="screen hidden"><div class="card"><h3>ISHCHILAR</h3><div id="users-list-div"></div><button id="t-back5" class="btn-blue" onclick="showView('view-main')">ORQAGA</button></div></div>
    <div id="view-user-detail" class="screen hidden"><div class="card"><h3 id="detail-name"></h3><div class="calendar-grid" id="admin-user-calendar"></div><div id="user-stats-table-div"></div><button id="t-back4" class="btn-blue" onclick="showView('view-users')">ORQAGA</button></div></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, push, get, onValue, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.visibility = 'hidden', 800); }, 2000));

    const firebaseConfig = { apiKey: "AIzaSyA...", authDomain: "stats-mb.firebaseapp.com", databaseURL: "https://stats-mb-default-rtdb.firebaseio.com", projectId: "stats-mb" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userData = null;
    let currentLang = 'lat';

    const translations = {
        lat: { authP: "Tizimga kiring", authBtn: "KIRISH", checkIn: "ISHGA KELDIM", back: "ORQAGA", alertIn: "Qayd etildi!", days: ["Du","Se","Ch","Pa","Ju","Sh","Ya"] },
        cyr: { authP: "Тизимга киринг", authBtn: "КИРИШ", checkIn: "ИШГА КЕЛДИМ", back: "ОРҚАГА", alertIn: "Қайд этилди!", days: ["Ду","Се","Чо","Па","Жу","Ша","Як"] }
    };

    window.setLang = (lang) => { 
        currentLang = lang; 
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        if(lang === 'lat') document.getElementById('btn-lat').classList.add('active');
        else document.getElementById('btn-cyr').classList.add('active');
        updateUI(); 
    };

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('t-auth-p').innerText = t.authP;
        document.getElementById('t-auth-btn').innerText = t.authBtn;
        document.getElementById('check-in-btn').innerText = t.checkIn;
        for(let i=1; i<=5; i++) { if(document.getElementById('t-back'+i)) document.getElementById('t-back'+i).innerText = t.back; }
    }

    window.showView = id => {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.login = async () => {
        const u = document.getElementById('user').value, p = document.getElementById('pass').value;
        if(u === "Admin" && p === "0000") { startApp({ism: "Admin", id: "0", role: "admin", pass: "0000"}); return; }
        const snap = await get(ref(db, 'users/' + u));
        if(snap.exists() && snap.val().pass === p) startApp(snap.val()); else alert("Xato!");
    };

    function startApp(user) {
        userData = user; showView('view-main');
        document.getElementById('prof-name').innerText = user.ism;
        document.getElementById('prof-id').innerText = "ID: " + user.id;
        document.getElementById('prof-pass').innerText = user.pass;
        document.getElementById('prof-tel-box').innerText = user.tel || "-";
        if(user.role === 'admin') {
            document.getElementById('admin-tools').classList.remove('hidden');
            document.getElementById('check-in-btn').classList.add('hidden');
            document.getElementById('t-my-attn').classList.add('hidden');
        } else {
            document.getElementById('admin-tools').classList.add('hidden');
            document.getElementById('check-in-btn').classList.remove('hidden');
            document.getElementById('t-my-attn').classList.remove('hidden');
        }
    }

    window.showMyAttendance = () => {
        showView('view-my-attn');
        renderCalendar('my-calendar', userData.id);
        loadMyHistory();
    };

    async function loadMyHistory() {
        const snap = await get(ref(db, 'history'));
        const list = document.getElementById('my-history-list'); list.innerHTML = "";
        if(snap.exists()) {
            snap.forEach(c => {
                if(c.val().id == userData.id) list.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:10px; margin-bottom:5px; font-size:12px; display:flex; justify-content:space-between;"><span>${c.val().sana}</span> <span>${c.val().vaqt}</span></div>`;
            });
        }
    }

    async function renderCalendar(divId, userId) {
        const cal = document.getElementById(divId); if(!cal) return;
        const now = new Date(), t = translations[currentLang];
        const snap = await get(ref(db, 'history'));
        let history = [];
        if(snap.exists()) snap.forEach(c => { if(c.val().id == userId) history.push(c.val().sana); });
        cal.innerHTML = t.days.map(d => `<div class="day-name">${d}</div>`).join('');
        const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const empty = first === 0 ? 6 : first - 1;
        const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        for(let i=0; i<empty; i++) cal.appendChild(document.createElement('div'));
        for(let d=1; d<=days; d++) {
            const div = document.createElement('div'); div.className = 'day'; div.innerText = d;
            const ds = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            if(d === now.getDate()) div.classList.add('today');
            if(history.includes(ds)) div.classList.add('present');
            cal.appendChild(div);
        }
    }

    window.doCheckIn = () => {
        const n = new Date(), ds = `${n.getFullYear()}-${(n.getMonth()+1).toString().padStart(2,'0')}-${n.getDate().toString().padStart(2,'0')}`;
        push(ref(db, 'history'), { id: userData.id, ism: userData.ism, sana: ds, vaqt: n.toLocaleTimeString() }).then(() => alert(translations[currentLang].alertIn));
    };

    onValue(ref(db, 'settings/news'), snap => {
        const box = document.getElementById('news-container');
        if(snap.exists() && snap.val() !== "") { document.getElementById('news-text').innerText = snap.val(); box.classList.remove('hidden'); }
        else box.classList.add('hidden');
    });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
