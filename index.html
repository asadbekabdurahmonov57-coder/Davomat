<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STATS MB - Ultimate Admin</title>
    <script>
        const sndLoading = new Audio('yuklash.mp3');
        sndLoading.loop = true;
        sndLoading.play().catch(() => {
            document.addEventListener('touchstart', () => sndLoading.play(), {once: true});
            document.addEventListener('click', () => sndLoading.play(), {once: true});
        });
    </script>
    <style>
        :root {
            --bg: #050510; --card: #12122b; --blue: #0080ff;
            --green: #00e676; --red: #ff3d00; --orange: #ff9100;
            --glass: rgba(255, 255, 255, 0.08);
            --neon-blue: 0 0 15px rgba(0, 128, 255, 0.4);
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-weight: 700 !important; 
            will-change: transform;
            user-select: none; 
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none;
        }

        input, textarea {
            user-select: text !important;
            -webkit-user-select: text !important;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
            background-size: cover; background-position: center;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050510; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        .splash-logo {
            font-size: 50px; color: var(--blue);
            text-shadow: 0 0 20px rgba(0, 128, 255, 0.6);
            animation: pulse 1.2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        .clock-loader {
            width: 80px; height: 80px; border: 4px solid var(--blue);
            border-radius: 50%; position: relative; box-shadow: var(--neon-blue);
        }
        .clock-loader::after, .clock-loader::before {
            content: ""; position: absolute; background-color: var(--blue);
            top: 50%; left: 50%; transform-origin: bottom center; border-radius: 2px;
        }
        .clock-loader::after { width: 4px; height: 20px; margin-left: -2px; margin-top: -20px; animation: clock-spin 6s linear infinite; }
        .clock-loader::before { width: 2px; height: 30px; margin-left: -1px; margin-top: -30px; animation: clock-spin 1s linear infinite; }

        @keyframes clock-spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }

        .app-wrapper { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .screen { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        .screen::-webkit-scrollbar { display: none; }
        
        .card { 
            background: var(--card); padding: 15px; border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid var(--glass); 
            text-align: center; margin-bottom: 10px; backdrop-filter: blur(15px);
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 15px; border: 1px solid #2a2a45; background: #000; color: white; font-size: 15px; outline: none; }
        button { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 18px; border: none; 
            font-size: 14px; cursor: pointer; transition: 0.2s; color: white; 
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:active { transform: scale(0.96); opacity: 0.8; }
        
        #check-in-btn {
            width: 150px !important; height: 150px !important; border-radius: 50% !important;
            margin: 15px auto !important; display: flex; align-items: center; justify-content: center;
            font-size: 16px !important; border: 5px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(0, 230, 118, 0.4);
        }

        .btn-blue { background: linear-gradient(135deg, #0080ff, #0055ff); }
        .btn-green { background: linear-gradient(135deg, #00e676, #00c853); color: #003300; }
        .btn-red { background: linear-gradient(135deg, #ff3d00, #d50000); }
        .btn-orange { background: linear-gradient(135deg, #ff9100, #ff6d00); }
        .btn-outline { background: transparent; border: 2px solid var(--glass); color: #fff; }
        
        .lang-btn { background: var(--blue) !important; color: white !important; opacity: 0.6; }
        .lang-btn.active { opacity: 1; box-shadow: 0 0 10px var(--blue); }

        #clock { font-size: 45px; color: #00ffb3; margin: 5px 0; text-shadow: 0 0 20px rgba(0,255,179,0.5); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; border: 1px solid var(--glass); }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #1a1a35; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .day.today { border: 1px solid var(--blue); color: var(--blue); }
        .day.present { background: var(--green); color: #000; }
        .day-name { font-size: 9px; color: #666; text-transform: uppercase; padding-bottom: 3px; }

        .hidden { display: none !important; }

        #toast {
            visibility: hidden; min-width: 250px; background: linear-gradient(135deg, #00e676, #00c853);
            color: #003300; text-align: center; border-radius: 20px; padding: 16px;
            position: fixed; z-index: 10000; left: 50%; bottom: 40px;
            transform: translateX(-50%); font-size: 14px; font-weight: 800 !important;
            box-shadow: 0 10px 30px rgba(0, 230, 118, 0.4); border: 2px solid rgba(255,255,255,0.3);
        }
        #toast.error-toast {
            background: linear-gradient(135deg, #ff3d00, #d50000) !important;
            color: #ffffff !important;
            box-shadow: 0 10px 30px rgba(255, 61, 0, 0.4) !important;
        }
        
        #toast.show { visibility: visible; animation: toastIn 0.5s, toastOut 0.5s 2.5s; }
        @keyframes toastIn { from { bottom: 0; opacity: 0; } to { bottom: 40px; opacity: 1; } }
        @keyframes toastOut { from { bottom: 40px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        .del-btn { 
            background: #ff3d00 !important; width: 30px !important; height: 30px !important; 
            padding: 0 !important; margin: 0 !important; border-radius: 8px !important; 
            font-size: 12px !important; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="splash-screen">
    <div class="splash-logo">STATS MB</div>
    <div class="clock-loader"></div>
    <p style="margin-top: 30px; color: #444; font-size: 12px; letter-spacing: 2px;">POWERED BY ASADBEK</p>
</div>

<div class="app-wrapper">
    <div id="view-auth" class="screen">
        <div class="card" style="margin-top: 20px;">
            <div class="lang-switch" style="display: flex; gap: 5px; justify-content: center; margin-bottom: 10px;">
                <button id="btn-lat" class="lang-btn active" style="width: auto; padding: 6px 12px; font-size: 10px;" onclick="setLang('lat')">LOTIN</button>
                <button id="btn-cyr" class="lang-btn" style="width: auto; padding: 6px 12px; font-size: 10px;" onclick="setLang('cyr')">КРИЛЛ</button>
            </div>
            <h1 style="color: var(--blue); font-size: 30px; margin: 0;">STATS MB</h1>
            <p id="t-auth-p" style="color: #666; margin-bottom: 10px;">Tizimga kiring</p>
            <input type="text" id="user" placeholder="Login">
            <input type="password" id="pass" placeholder="Parol">
            <button id="t-auth-btn" class="btn-blue" onclick="login()">KIRISH</button>
            <button id="t-reg-go" class="btn-outline" onclick="showView('view-reg')">RO'YXATDAN O'TISH</button>
        </div>
    </div>

    <div id="view-reg" class="screen hidden">
        <div class="card">
            <h2 id="t-reg-h2" style="color: var(--orange); margin: 0 0 10px 0;">YANGI HISOB</h2>
            <input type="text" id="reg-user" placeholder="Ism sharif">
            <input type="tel" id="reg-phone" placeholder="Telefon raqam">
            <input type="password" id="reg-pass" placeholder="Parol">
            <button id="t-reg-btn" class="btn-orange" onclick="doRegister()">YARATISH</button>
            <button id="t-back1" class="btn-outline" onclick="showView('view-auth')">ORQAGA</button>
        </div>
    </div>

    <div id="view-main" class="screen hidden">
        <div class="card">
            <div id="clock">00:00:00</div>
            <p style="color: #444; font-size: 10px; margin: -5px 0 10px 0; letter-spacing: 1px;">POWERED BY ASADBEK</p>
            <div id="news-container" class="announcement-box hidden" style="background: linear-gradient(45deg, rgba(255, 145, 0, 0.1), rgba(0, 128, 255, 0.1)); border-left: 4px solid var(--orange); padding: 10px; border-radius: 12px; margin: 10px 0; text-align: left; font-size: 12px;">
                <strong id="t-news-label" style="color:var(--orange)">📢 E'LON:</strong>
                <div id="news-text">...</div>
            </div>
            <button class="btn-green" id="check-in-btn" onclick="doCheckIn()">ISHGA KELDIM</button>
            <button id="t-my-attn" class="btn-outline" style="border-color: var(--green); color: var(--green);" onclick="showMyAttendance()">DAVOMAT BO'LIMI</button>
            <button id="t-profile-go" class="btn-blue" onclick="showView('view-profile')">MENING PROFILIM</button>
            
            <div id="admin-tools" class="hidden" style="margin-top: 15px; border-top: 1px solid #2a2a45; padding-top: 10px;">
                <button id="t-admin-news" class="btn-green" onclick="showView('view-news-edit')">E'LON QOLDIRISH</button>
                <button id="t-admin-users" class="btn-orange" onclick="showUsersList()">ISHCHILAR (DAVOMAT)</button>
            </div>
            <button id="t-logout" class="btn-red" onclick="location.reload()">CHIQISH</button>
        </div>
    </div>

    <div id="view-my-attn" class="screen hidden">
        <div class="card">
            <h3 style="margin: 0; color: var(--green);">MENING DAVOMATIM</h3>
            <div class="calendar-grid" id="my-calendar"></div>
            <div id="my-history-list" style="margin-top: 15px; max-height: 200px; overflow-y: auto;"></div>
            <button class="btn-blue" onclick="showView('view-main')" style="margin-top: 10px;">ORQAGA</button>
        </div>
    </div>

    <div id="view-profile" class="screen hidden">
        <div class="card">
            <div class="profile-header" style="display: flex; align-items: center; gap: 15px; text-align: left; margin-bottom: 15px;">
                <div class="profile-avatar" style="width: 60px; height: 60px; background: #1a1a35; border-radius: 50%; border: 2px solid var(--blue); display: flex; align-items: center; justify-content: center;"><img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width: 70%;"></div>
                <div>
                    <h2 id="prof-name" style="margin: 0; color: var(--blue); font-size: 18px;">...</h2>
                    <p id="prof-id" style="margin: 0; color: #888; font-size: 11px;">ID: 0</p>
                </div>
            </div>
            <div style="text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid var(--glass); font-size: 13px;">
                <p>📞 Tel: <span id="prof-tel-box"></span></p>
                <p>🔑 Parol: <span id="prof-pass" style="color: var(--orange);"></span></p>
            </div>
            <button class="btn-blue" onclick="showView('view-main')" style="margin-top: 15px;">ORQAGA</button>
        </div>
    </div>

    <div id="view-news-edit" class="screen hidden"><div class="card"><h3>E'LON</h3><textarea id="news-input" style="width:100%; height:80px; background:#000; color:#fff; border-radius:10px; padding:10px; border:1px solid var(--blue);"></textarea><button class="btn-green" onclick="saveNews()">SAQLASH</button><button class="btn-blue" onclick="showView('view-main')">ORQAGA</button></div></div>
    
    <div id="view-users" class="screen hidden"><div class="card"><h3>ISHCHILAR</h3><div id="users-list-div"></div><button class="btn-blue" onclick="showView('view-main')">ORQAGA</button></div></div>
    
    <div id="view-user-detail" class="screen hidden">
        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h3 id="detail-name" style="color: var(--blue); margin: 0;"></h3>
                <button id="del-acc-btn" class="del-btn" style="width: auto !important; padding: 5px 10px !important;">O'CHIRISH</button>
            </div>
            <div id="user-info-box" style="font-size: 12px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: left; margin: 10px 0;"></div>
            <div class="calendar-grid" id="admin-user-calendar"></div>
            <h4 style="margin: 15px 0 5px 0; font-size: 14px;">KELGAN VAQTLARI:</h4>
            <div id="user-stats-table-div" style="max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 5px;"></div>
            <button class="btn-blue" onclick="showView('view-users')" style="margin-top: 10px;">ORQAGA</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, set, push, get, onValue, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const sndClick = new Audio('bosishlar.mp3');
    const sndSuccess = new Audio('saqlandi.mp3');
    const sndDelete = new Audio('muvaffaqiyatli.mp3'); 
    const sndError = new Audio('xatolik.mp3');
    const sndTick = new Audio('soniya.mp3'); 

    window.addEventListener('load', () => {
        setTimeout(() => { 
            const ss = document.getElementById('splash-screen');
            ss.style.opacity = '0'; 
            setTimeout(() => {
                ss.style.visibility = 'hidden';
                sndLoading.pause(); 
                sndLoading.currentTime = 0;
            }, 400); 
        }, 1200);
    });

    document.addEventListener('click', (e) => {
        if(e.target.tagName === 'BUTTON') {
            sndClick.currentTime = 0;
            sndClick.play();
        }
    });

    const firebaseConfig = { apiKey: "AIzaSyA...", authDomain: "stats-mb.firebaseapp.com", databaseURL: "https://stats-mb-default-rtdb.firebaseio.com", projectId: "stats-mb" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let userData = null;
    let currentLang = 'lat';

    const translations = {
        lat: { authP: "Tizimga kiring", authBtn: "KIRISH", checkIn: "ISHGA KELDIM", back: "ORQAGA", alertIn: "Qayd etildi!", days: ["Du","Se","Ch","Pa","Ju","Sh","Ya"] },
        cyr: { authP: "Тизимга киринг", authBtn: "КИРИШ", checkIn: "ИШГА КЕЛДИМ", back: "ОРҚАГА", alertIn: "Қайд этилди!", days: ["Ду","Се","Чо","Па","Жу","Ша","Як"] }
    };

    window.showView = id => {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    };

    window.setLang = (lang) => { 
        currentLang = lang; 
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + lang).classList.add('active');
        updateUI(); 
    };

    function updateUI() {
        const t = translations[currentLang];
        document.getElementById('t-auth-p').innerText = t.authP;
        document.getElementById('t-auth-btn').innerText = t.authBtn;
        document.getElementById('check-in-btn').innerText = t.checkIn;
    }

    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.innerText = msg;
        
        if(type === 'error' || msg.includes("Xato") || msg.includes("kam")) {
            t.classList.add('error-toast');
            sndError.play();
        } else {
            t.classList.remove('error-toast');
        }
        
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    // Funksiyani global qilish (kalendar uchun)
    window.showToast = showToast;

    window.login = async () => {
        const u = document.getElementById('user').value.trim(), p = document.getElementById('pass').value.trim();
        if(!u || !p) { sndError.play(); return; }
        if(u === "Admin" && p === "0000") { startApp({ism: "Admin", id: "0", role: "admin", pass: "0000"}); return; }
        const snap = await get(ref(db, 'users/' + u));
        if(snap.exists() && snap.val().pass === p) startApp(snap.val()); 
        else showToast("Xato!", 'error');
    };

    window.doRegister = async () => {
        const ism = document.getElementById('reg-user').value.trim();
        const tel = document.getElementById('reg-phone').value.trim();
        const pass = document.getElementById('reg-pass').value.trim();
        if(!ism || !pass) return showToast("Ma'lumotlar kam!", 'error');
        const id = Math.floor(1000 + Math.random() * 9000);
        await set(ref(db, 'users/' + ism), { ism, tel, pass, id, role: 'user' });
        showToast("Bajarildi!");
        window.showView('view-auth');
    };

    function startApp(user) {
        userData = user; 
        window.showView('view-main');
        document.getElementById('prof-name').innerText = user.ism;
        document.getElementById('prof-id').innerText = "ID: " + user.id;
        document.getElementById('prof-pass').innerText = user.pass;
        document.getElementById('prof-tel-box').innerText = user.tel || "-";
        
        const isAdmin = user.role === 'admin';
        document.getElementById('admin-tools').classList.toggle('hidden', !isAdmin);
        document.getElementById('check-in-btn').classList.toggle('hidden', isAdmin);
        document.getElementById('t-my-attn').classList.toggle('hidden', isAdmin);
    }

    window.showUsersList = async () => {
        window.showView('view-users');
        const snap = await get(ref(db, 'users'));
        const div = document.getElementById('users-list-div');
        let html = "";
        if(snap.exists()){
            snap.forEach(u => {
                const d = u.val();
                if(d.role !== 'admin') html += `<button class="btn-outline" style="margin-bottom:5px;" onclick='showUserDetail(${JSON.stringify(d)})'>${d.ism}</button>`;
            });
        }
        div.innerHTML = html;
    };

    window.showUserDetail = async (user) => {
        window.showView('view-user-detail');
        document.getElementById('detail-name').innerText = user.ism;
        document.getElementById('user-info-box').innerHTML = `<p style="margin:2px 0;">🔑 Parol: <span style="color:var(--orange)">${user.pass}</span></p><p style="margin:2px 0;">📞 Tel: ${user.tel || '—'}</p><p style="margin:2px 0;">🆔 ID: ${user.id}</p>`;
        
        document.getElementById('del-acc-btn').onclick = async () => {
            await remove(ref(db, 'users/' + user.ism));
            sndDelete.play(); 
            showToast("O'chirildi");
            window.showUsersList();
        };

        renderCalendar('admin-user-calendar', user.id);
        loadUserHistory(user);
    };

    async function loadUserHistory(user) {
        const histSnap = await get(ref(db, 'history'));
        let rows = "";
        if(histSnap.exists()){
            histSnap.forEach(h => {
                const val = h.val();
                const key = h.key;
                if(val.id == user.id) {
                    rows = `<div id="row-${key}" style="display:flex; justify-content:space-between; align-items:center; padding:8px; border-bottom:1px solid rgba(255,255,255,0.1); font-size:12px;">
                        <span>📅 ${val.sana} ⏰ ${val.vaqt}</span>
                        <button class="del-btn" onclick="deleteHistoryItem('${key}', '${user.id}')">X</button>
                    </div>` + rows;
                }
            });
        }
        document.getElementById('user-stats-table-div').innerHTML = rows || "<p style='font-size:12px; opacity:0.5;'>Yo'q</p>";
    }

    window.deleteHistoryItem = async (key, userId) => {
        await remove(ref(db, 'history/' + key));
        const el = document.getElementById('row-' + key);
        if(el) el.remove();
        sndDelete.play(); 
        showToast("O'chirildi");
        renderCalendar('admin-user-calendar', userId);
    };

    window.showMyAttendance = () => {
        window.showView('view-my-attn');
        renderCalendar('my-calendar', userData.id);
        loadMyHistory();
    };

    async function loadMyHistory() {
        const snap = await get(ref(db, 'history'));
        let html = "";
        if(snap.exists()) {
            snap.forEach(c => {
                const v = c.val();
                if(v.id == userData.id) html = `<div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:10px; margin-bottom:5px; font-size:12px; display:flex; justify-content:space-between;"><span>${v.sana}</span> <span>${v.vaqt}</span></div>` + html;
            });
        }
        document.getElementById('my-history-list').innerHTML = html;
    }

    async function renderCalendar(divId, userId) {
        const cal = document.getElementById(divId);
        if(!cal) return;
        const now = new Date(), t = translations[currentLang];
        const snap = await get(ref(db, 'history'));
        
        let historyData = {}; 
        if(snap.exists()) {
            snap.forEach(c => { 
                const v = c.val();
                if(v.id == userId) historyData[v.sana] = v.vaqt; 
            });
        }

        let html = t.days.map(d => `<div class="day-name">${d}</div>`).join('');
        const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const empty = first === 0 ? 6 : first - 1;
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

        for(let i=0; i<empty; i++) html += `<div></div>`;
        for(let d=1; d<=daysInMonth; d++) {
            const ds = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            let cls = 'day';
            let clickAttr = "";
            
            if(d === now.getDate()) cls += ' today';
            
            if(historyData[ds]) {
                cls += ' present';
                // Yashil kun bosilganda vaqtni ko'rsatadi
                clickAttr = `onclick="window.showToast('ISHGA KELGAN VAQTI: ${historyData[ds]}')"`;
            }
            
            html += `<div class="${cls}" ${clickAttr}>${d}</div>`;
        }
        cal.innerHTML = html;
    }

    window.doCheckIn = () => {
        const n = new Date();
        const ds = `${n.getFullYear()}-${(n.getMonth()+1).toString().padStart(2,'0')}-${n.getDate().toString().padStart(2,'0')}`;
        const vt = n.toLocaleTimeString('it-IT').substring(0, 5);
        push(ref(db, 'history'), { id: userData.id, ism: userData.ism, sana: ds, vaqt: vt }).then(() => {
            sndSuccess.play(); 
            showToast(translations[currentLang].alertIn);
            if(userData.role !== 'admin') renderCalendar('my-calendar', userData.id);
        });
    };

    window.saveNews = () => {
        const val = document.getElementById('news-input').value;
        set(ref(db, 'settings/news'), val).then(() => { 
            sndSuccess.play();
            showToast("Saqlandi!"); 
            window.showView('view-main'); 
        });
    };

    onValue(ref(db, 'settings/news'), snap => {
        const box = document.getElementById('news-container');
        if(snap.exists() && snap.val() !== "") { 
            document.getElementById('news-text').innerText = snap.val(); 
            box.classList.remove('hidden'); 
        } else box.classList.add('hidden');
    });

    setInterval(() => { 
        const clockEl = document.getElementById('clock');
        if(clockEl) {
            clockEl.innerText = new Date().toLocaleTimeString('it-IT'); 
            if(userData) {
                sndTick.currentTime = 0;
                sndTick.play().catch(() => {});
            }
        }
    }, 1000);
</script>
</body>
</html>
